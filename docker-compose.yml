version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: vibechat-db
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "vibechat"
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: vibechat-redis
    command: redis-server --requirepass "VibeChat2026Secure"
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: vibechat-backend
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      - MYSQL_URL=mysql+pymysql://root:123456@db:3306/vibechat
      - REDIS_URL=redis://:VibeChat2026Secure@redis:6379/0

  frontend:
    build:
      context: ./frontend
    container_name: vibechat-frontend
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
